  id: 904
  title: "Design Thinking for Healthcare Innovation"
  description: "An introduction to the Biodesign innovation framework and its application to medtech and healthcare AI development. This interactive workshop guides participants through structured methods for identifying unmet clinical needs, filtering opportunities, and crafting impactful solutions. Attendees gain practical tools for translating ideas into viable, patient-centred products while considering industry and commercial realities."
  subtype: workshop
