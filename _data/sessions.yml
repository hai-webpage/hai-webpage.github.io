  id: 903
  title: "AWS Hands-on: Amazon Quick Suite"
  description: "A guided, hands-on workshop on Amazon Quick Suite, an AI-powered agentic workspace designed to accelerate research, data analysis, and workflow automation. It combines features such as Amazon Quick Index — a unified search repository that connects disparate data sources into a single, intelligent knowledge base — with Amazon Quick Research, an AI agent that conducts comprehensive research by analyzing multiple data sources and generating detailed reports."
  subtype: workshop
