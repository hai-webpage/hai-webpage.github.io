  id: 12
  name: "Abel"
  surname: "Ang"
  company: "Advanced MedTech Investments"
  title: "Adjunct Professor and Chairperson"
  bio: "<p>Ang is the chairperson of Advanced MedTech Investments. Between 2014 and 2024, he led Advanced MedTech - Temasek Holding's US$335M global platform in urology devices and services. As Founding President and Group CEO, he transformed the carved-out medical device platform from a loss-making unit to a top performer (IRR-returns) within Temasek’s portfolio. He drove significant revenue growth by transforming the group’s product portfolio, achieving a 4-fold increase during his tenure, while simultaneously increasing EBITDA by 33 times without any additional capital from shareholders.</p><p>Ang boasts a proven track record of medtech innovation, having brought 100 distinct devices to market globally. He specializes in accelerating R&D productivity and scaling commercial organizations to extract maximum value from new product innovation, especially in the US. Advanced MedTech’s US revenue grew 10-fold during his tenure to US$200M with an annual growth-rate of 22.3% in 2024.</p><p>He served as Senior Advisor to the CEO of Greatbatch Inc. (NYSE: ITGR), supporting innovation across cardiac, neurology, vascular, and orthopedic markets. Prior to this, Ang led Hill-Rom Inc., a $3B medical device company (acquired by BAX), as President, Asia/Pacific. As Hill-Rom's Chief Technology Officer, he oversaw global R&D operations spanning the U.S., Mexico, France, and Singapore. He also held key leadership roles including Vice-President and General Manager of the $420M Global Therapy Business Unit and Vice-President for International M&A. He formerly headed the global Medical Technology and Biotechnology industry groups in the Singapore Economic Development Board (EDB).</p><p>Ang sits on the Board of Economic Development Innovations Singapore, a privately-held investment holding company headquartered in Singapore with investments in deeptech and listed assets. He sits on the Boards of Advanced MedTech Holdings, SonoMotion Inc., ABM Respiratory Inc., and Vivance(formerly AWAK Technologies), where he chairs the Board. He was formerly on the Board and Nominating Committee of Aslan Pharmaceuticals (NYSE: ASLN).</p><p>On the education front, Ang is an adjunct full-professor at the Nanyang Business School in Singapore and Waseda University in Japan, where he teaches in their respective MBA programs. He is Chairman of Republic Polytechnic and Vice-Chairman of Singapore Institute of Management that collectively have 30,000 full-time higher education students. Ang has a Master of Science in Computational Biology from Rutgers University in New Jersey, which he pursued while on an EDB scholarship. He attended Harvard Business School’s Advanced Management Program in 2012.</p><p>He was awarded the Public Service Medal (PBM) in 2021 for his contributions to the medical device industry in Singapore. He was again awarded the Public Service Medal (COVID-19) in 2022 for his innovative achievements during COVID.</p><p>Ang is married and has 2 grown boys. He writes a regular column in The Straits Times and wing-foils in his free time.</p>"
  thumbnailUrl: AbelAng.png
  cardThumbnailUrl: AbelAng2.png
  rockstar: false
