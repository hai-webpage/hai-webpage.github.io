  id: 25
  name: "Kwok Ming"
  surname: "Lee"
  company: "Ministry of Health"
  title: "Group Director (Ageing Planning Office)"
  bio: "<p>Mr. Lee Kwok Ming was appointed Group Director of the Ageing Planning Office in the Ministry of Health on 9 October 2023. He oversees the development and implementation of the national ageing agenda, to bring about the national vision of opportunities, communities and a city for all ages. This whole-of-government work spans a wide range of areas including Age Well SG, aged care services, senior housing, seniors health & wellness and ageing research & development.</p><p>Kwok Ming’s public service career started in 2008 at the Income Security Policy Division in the Ministry of Manpower. He was responsible for formulating policies, including those related to the Central Provident Fund (CPF), to enhance the retirement adequacy of Singaporeans. Following that he served in a succession of portfolios, including Reserves and Investment at the Ministry of Finance, Land Transport at the Ministry of Transport. In 2019, he returned to the Ministry of Manpower as the Director (Retirement Systems) at the Income Security Policy Division where he was driving projects such as strengthening basic work protections for Platform Workers as well as the development of the Majulah Package.</p><p>Kwok Ming graduated from Carnegie Mellon University with a B. Sci. Electrical & Computer Engineering with Additional Major in Economics. He also holds a M. Sci. in Management Science & Engineering from Stanford University and an MBA from INSEAD. Kwok Ming is married with a son and a daughter.</p>"
  thumbnailUrl: LeeKwokMing.jpg
  cardThumbnailUrl: LeeKwokMing2.png
  rockstar: false
- 
  id: 33
  name: "Phin Peng"
  surname: "Lee"
  company: "Singapore Biodesign"
  title: "Acting Program Director"
  presentation: 
  bio: "<p>Dr. Lee Phin Peng is currently serving as the Programme Director for Singapore Biodesign, which is the national platform for health and medtech innovation talent development, and the Lead for MedTech at A*STAR. Dr. Lee also holds an adjunct Assistant Professor position at the Duke-NUS Medical School.</p><p>Dr. Lee is passionate about health and medtech innovation and has been building national-level programmes and initiatives related to talent development, sustaining project pipelines, and accelerating startups. Dr. Lee has been directly involved with raising more than $110M in funding for national programmes. He is also actively involved in mentoring programmes for various accelerators and venture building programmes. Dr. Lee is a certified adult educator who has trained researchers, healthcare professionals, and corporates in Design Thinking and the Biodesign methodology.</p><p>Dr. Lee holds a PhD in Bioengineering from the University of California, San Francisco – Berkeley and a BSc in Biomedical Engineering from Brown University. He completed his post-doctoral training at the Stanford School of Medicine under the Singapore-Stanford Biodesign Innovation Fellowship.</p"
  thumbnailUrl: LeePhinPeng.jpg
  cardThumbnailUrl: LeePhinPeng2.png
