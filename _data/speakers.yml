  id: 22
  name: "Nigam H."
  surname: "Shah"
  company: "Stanford University"
  title: "Chief Data Scientist, Stanford Health Care, and Professor of Medicine, and of Biomedical Data Science, Associate Dean (School of Medicine), Associate Director (Stanford Center for Biomedical Informatics Research)"
  bio: "<p>Dr. Nigam Shah is Professor of Medicine at Stanford University and Chief Data Scientist for Stanford Health Care. He is a world-renowned scientist and entrepreneur with deep expertise in applying machine learning and artificial intelligence (AI) to analyze diverse health data, including electronic health records, claims, and wearables. In his Chief Data Scientist role, he oversees the responsible use of AI for advancing disease understanding and improving clinical care delivery across Stanford Health Care. In 2018, he created the USA's only bedside consultation service, to provide clinicians with on-demand patient outcome summaries. This service was cited in Congressional testimony and was spun out as the independent company Atropos Health in 2021.</p><p>Shah's research is highly influential, with over 350 publications (h-index 94) in journals such as JAMA and the New England Journal of Medicine, receiving over 43,000 citations. As an entrepreneur, he holds nine patents and co-founded three companies that collectively raised over $100 million. He is a dedicated educator, teaching in multiple graduate classes at Stanford University and in an AI in Healthcare Specialization to over 60,000 students online. He is a member of the National Academy of Medicine’s Digital Learning Collaborative as well as a cofounder of the coalition for health AI, which provides guidelines for the responsible use of AI in healthcare.</p>"
  thumbnailUrl: NigamShah.jpg
  cardThumbnailUrl: NigamShah2.png
  rockstar: true
-
  id: 10
  name: "Joe"
  surname: "Sim"
  company: "NHG Health"
  title: "Group Chief Executive Officer"
  bio: "<p>Prof Joe Sim is the Group Chief Executive Officer (GCEO) of NHG Health, one of Singapore’s three public healthcare clusters comprising an integrated system of polyclinics, acute care and tertiary hospitals, and national specialty centres. Prof Sim oversees NHG Health’s strategies to improve access to and equity in healthcare through innovation, evidence-based research, technology and meaningful collaborations.</p><p>Before joining NHG Health, Prof Sim was the Group Chief Operating Officer and Acting GCEO of IHH Healthcare Berhad (listed in both Singapore Exchange and Bursa Malaysia) where he was responsible for its integrated healthcare businesses comprising more than 80 hospitals and multiple business units across 10 countries. He joined IHH in 2017 as the CEO of Malaysia Operations Division, overseeing operations and management for IHH’s business units in Malaysia covering a network of 15 Gleneagles and Pantai hospitals and ancillary services such as Pantai Integrated Rehab and Pantai Premier Pathology.</p><p>Prior to IHH, Prof Sim was Deputy Chief Executive of the National University Health System (NUHS), another public healthcare cluster in Singapore. Prof Sim graduated with First Class Honours in Bachelor of Arts in Electronic and Information Science from Cambridge University, and holds a Master in Public Administration from Harvard University.</p>"
  thumbnailUrl: JoeSim.jpg
  cardThumbnailUrl: JoeSim2.png
  rockstar: true
