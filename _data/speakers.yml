  id: 23
  name: "Lawrence"
  surname: "Wee"
  company: "Infocomm Media Development Authority"
  title: "Director, Business and Ecosystems"
  bio: "<p>Dr. Lawrence Wee is currently Director of the Business and Ecosystems division at IMDA. His team is responsible for driving strategic collaborations to catalyze the exploitation and adoption of AI and emerging technologies for enterprises.</p><p>He started his career in public sector research and development when he founded the Healthcare and Biomedical Analytics Laboratory at the Institute of Infocomm Research (I2R), which focused on building deep capabilities in machine learning for biomedicine and healthcare. After the stint at I2R, he moved on to Zuellig Pharma where he took on the role of Chief Data Scientist and led the development of institutional data science capabilities across APAC region. Following that, he joined Allianz Asia-Pacific, where he was responsible for building the regional APAC healthcare data science capabilities across life and health insurance business units. Thereafter, he returned to public service at the Ministry of Health where he had the opportunity to drive strategy and capability development in AI and emerging technologies for the public health sector.</p><p>He is an Associate Faculty at the Singapore University of Social Sciences, and was previously the President of the Association for Medical and Bio-informatics Singapore (AMBIS), and vice-chair of the Chinese-American Pharmaceutical Society (CABS) Singapore chapter.</p><p>He received his Ph.D. in Computational Biology from the National University of Singapore.</p>"
  thumbnailUrl: LawrenceWee.jpg
  cardThumbnailUrl: LawrenceWee2.png
  rockstar: false
- 
  id: 2
  name: "Tien Yin"
  surname: "Wong"
  company: "Tsinghua University"
  title: "Professor & Senior Vice Chancellor, Tsinghua Medicine and Vice Provost"
  presentation: "The AI-augmented hospital: Lessons and Challenges"
  bio: "<p>Professor Tien Yin Wong is a physician-scientist-innovator and the Senior Vice-Chancellor of Tsinghua Medicine and Vice-Provost of Tsinghua University, China. He has worked and held senior leadership roles in Singapore and Australia, including at the National University of Singapore, SingHealth Duke-NUS Medical School, Singapore National Eye Centre, and University of Melbourne.</p><p>Prof Wong is a practicing retinal specialist, with a research portfolio on retinal diseases, ocular imaging, AI and digital technology. He has published >1,600 peer-reviewed papers (H-index >200, highly cited researcher 2020-2025), given >600 invited named, plenary and symposium lectures, and received >US$100 million in grant funding. Prof Wong has been recognized with multiple international awards, including Arnall Patz Medal (Macula Society), Jose Rizal Medal (Asia Pacific Academy of Ophthalmology) and Friedenwald Award (ARVO). He has received Singapore’s President’s Science and Technology Award. He is an elected international (foreign) member of the US National Academy of Medicine and the Australian Academy of Health and Medical Sciences. He is also an elected fellow of the UK Royal Society.</p"
  thumbnailUrl: WongTienYin.jpg
  cardThumbnailUrl: WongTienYin2.png
  rockstar: true
