  title: "Head, Artificial Intelligence Office"
  bio: "<p>Prof Ngiam Kee Yuan is Head of the Artificial Intelligence Office, National University Health System. He is also Adjunct Professor at the Department of Surgery, Yong Loo Lin School of Medicine, National University of Singapore. In his clinical role, he is Head and Senior Consultant at the Division of General Surgery (Thyroid & Endocrine Surgery) at the National University Hospital, specialising in Thyroid and Endocrine surgical disorders. His special interests are in thyroid and endocrine surgery, robotic thyroid surgery, AI and technology implementation in healthcare.</p>"
