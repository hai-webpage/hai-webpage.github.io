 id: 13
 name: "Vy"
 surname: "Tran"
 company: "Siemens Healthineers"
 title: "President, Asia Pacific and Japan (APJ)"
 bio: "Vy Tran is a healthcare leader with a broad range of experience in medtech, medical devices and oncology.</p><p>As the President of Asia Pacific and Japan (APJ), Vy is responsible for one of the fastest growing and dynamic regions in Siemens Healthineers. She leads a passionate team of more than 5,000 Healthineers with a strong purpose of pioneering breakthroughs in healthcare, for everyone, everywhere, sustainably.</p><p>Since becoming the commercial regional head in 2022, Vy has led several strategic and digital transformation initiatives with a laser focus to build a more patient and customer-centric organization that brings high value care through a broad portfolio of healthcare offerings that alleviates key disease burdens and increases access to care in Asia.</p><p>In addition, Vy is responsible for the strategy, P&L and market growth for APJ and a member of the Siemens Healthineers Global Leadership Committee. Vy also sits on the Board of Asia Pacific Medical Technology Association (APACMed) and US-India Strategic Partnership Forum.</p><p>Prior to Siemens Healthineers, Vy served in leadership roles at Varian including Chief Compliance Office where she led policy development and regulatory reform. She was also instrumental in sharpening Varian’s focus on becoming a leading cancer care company through strategic acquisitions, divestments and was involved in the combination of Varian and Siemens Healthineers in 2021.</p><p>Vy is passionate about bringing access and equity to patients and her personal mission of promoting diversity, equality and empowering people to reach their potential.</p><p>Vy holds a bachelor’s degree of Science from Santa Clara University and a Juris Doctorate from Lincoln Law School. In line with her interest in early childhood education, Vy is part of the Board of Directors for the Children’s Discovery Museum of San Jose and serves as the Board Secretary.</p><p>Originally from Silicon Valley, Vy lives in Singapore, with her husband and two teenage daughters.</p>"
 thumbnailUrl: VyTran.jpg
 cardThumbnailUrl: VyTran2.png
