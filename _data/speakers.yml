  id: 29
  name: "Tom"
  surname: "Smoot"
  company: "Epic Systems"
  title: "Country Lead (Singapore)"
  bio: "<p>Tom has spent 15 years at Epic leading large-scale healthcare IT transformation. After more than a decade working with health systems across the United States, Tom moved to Europe in 2023, where he led implementations with academic medical centres in Switzerland and the Netherlands and also witnessed firsthand the early rollout of Epic's AI capabilities in live clinical environments.</p><p>In early 2025, Tom relocated to Singapore as Epic's Country Lead, taking on responsibility for all of Epic's operations in the region. He oversees ongoing partnerships with NUHS and NHG Health - both live on Epic - while leading two concurrent implementations with SingHealth and the Singapore Armed Forces, which will mark the first time Epic has been deployed simultaneously across a national public health system and a defence medical system. Tom is actively engaged with the PHIs and the Ministry of Health on building a path to bring Epic's native generative AI capabilities to Singapore.</p>"
  thumbnailUrl: TomSmoot.jpg
  cardThumbnailUrl: TomSmoot2.png
  rockstar: false
