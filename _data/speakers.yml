  id: 24
  name: "Rob"
  surname: "Korom"
  company: "Penda Health"
  title: "Chief Medical Officer"
  bio: "<p>Rob Korom, MD, is Chief Medical Officer of Penda Health, a tech-enabled network of primary care clinics in Kenya serving over 1,000 patients daily across Nairobi. He leads clinical quality, AI-driven decision support, and digital innovation to advance Penda’s mission of becoming the most trusted healthcare provider in Africa.</p>"
  thumbnailUrl: RobKorom.jpg
