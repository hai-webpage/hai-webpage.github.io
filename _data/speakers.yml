  id: 14
  name: "Joseph"
  surname: "Mocanu"
  company: "Verge HealthTech"
  title: "Managing Partner"
  bio: "<p>Dr. Joseph Mocanu is the co-founder and Managing Partner of Verge HealthTech Fund focusing on early-stage healthcare technology companies that make an impact on global health. Prior to this, Joseph was a scientist researching new cancer therapies, a medical device entrepreneur, and a management consultant for Oliver Wyman where he led life sciences and digital health across Asia. He has 19 scientific publications, 3 patents, and has made investments in 46 healthcare technology companies to date. Joseph has a PhD from the University of Toronto, and an MBA from the Richard Ivey School of Business.</p>"
