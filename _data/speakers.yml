  id: 17
  name: "Yong"
  surname: "Liu"
  company: "A*STAR Institute of High Performance Computing"
  title: "Deputy Director of Computing and Intelligence"
  bio: "<p>Dr Liu Yong is Deputy Department Director, Computing & Intelligence Department at Institute of High Performance Computing (IHPC), A*STAR, Singapore. He is also Adjunct Associate Professor at Duke-NUS Medical School, NUS and Adjunct Principal Investigator at Singapore Eye Research Institute (SERI).</p><p>Being passionate on the potential of AI on healthcare, he has led multiple research projects in multimodal machine learning, medical imaging analysis, especially AI for digital ophthalmology and other areas in healthcare. Together with clinicians, he has been awarded large scale programme and multiple grants as PI in the area of AI for healthcare. He and his team have been awarded multiple grants from AI SG, NMRC, IAF-PP, and NHIC. He and his team have also published top tier papers in New England Journal of Medicine, Lancet Digital Health, Nature Aging, Ophthalmology, Neurology, Annals of Neurology, and also top-tier AI papers (AAAI, CVPR, IJCAI, MICCAI). He has won the Nation Award (Covid-19) Commendation Medal. His papers received Best Paper Award at REMIA workshop with 2022 MICCAI, Best Paper Award at BeyondLabeler Workshop on International Joint Conference on Artificial Intelligence (IJCAI) 2016. He and his team has also won the 3rd Place GAMMA Challenge in MICCAI 2021, the NSCC Outstanding HPC Innovation Award 2017, and the first prize of Rakuten TV recommendation Challenge 2015.</p>"
  thumbnailUrl: LiuYong.jpg
  cardThumbnailUrl: LiuYong2.png
  rockstar: false
-
  id: 28
  name: "Andrea Britta"
  surname: "Maier"
  company: "NUS Yong Loo Lin School of Medicine"
  title: "Oon Chiew Seng Professor in Medicine, Healthy Ageing and Dementia Research"
  bio: "<p>Andrea Maier (1978), a Fellow of the Royal Australasian College of Physicians (FRACP), graduated in Medicine (MD) 2003 from the University of Lübeck (Germany), was registered 2009 in The Netherlands as Specialist in Internal Medicine-Geriatrics and was appointed Full Professor of Gerontology at Vrije Universiteit Amsterdam (The Netherlands) in 2013. She was the head of Geriatrics at the Vrije Universiteit Medical Center from 2012 to 2016. From 2016 to early 2021 Professor Maier served as Divisional Director of Medicine and Community Care at the Royal Melbourne Hospital, Australia, and as Professor of Medicine and Aged Care at the University of Melbourne, Australia.</p>"
  thumbnailUrl: AndreaMaier.jpg
  cardThumbnailUrl: AndreaMaier2.png
  rockstar: false
