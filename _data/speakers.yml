  id: 21
  name: "Navjeewan"
  surname: "Khosla"
  company: "Novo Holdings"
  title: "Partner"
  bio: "<p>Nav joined Novo Holdings Asia in August 2021. He focusses on deal sourcing and execution as well as in managing and developing the growing portfolio of investments, focusing primarily on the markets in China, India, and Southeast Asia.</p><p>Prior to joining Novo Holdings Asia, Nav was a Director in Quadria Capital, a mid-market private equity firm focusing on healthcare investments in India and South East Asia. Before joining Quadria Capital, Nav was the Managing Director at Fosun, where he worked on both private and public healthcare investment opportunities across the Asia-Pacific region. Nav started his investment career with Merrill Lynch in Hong Kong and moved to UBS Global Asset Management in Singapore before joining Fosun.</p><p>Nav holds an MBA from Indian Institute of Management (IIM), Ahmedabad, in India and Bachelor of Technology from Indian institute of Technology (IIT), Kharagpur in India.</p>"
  thumbnailUrl: NavjeewanKhosla.png
  cardThumbnailUrl: NavjeewanKhosla2.png
  rockstar: false
