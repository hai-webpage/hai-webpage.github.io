  id: 27
  name: "Alina"
  surname: "Rodriguez"
  company: "NUS Yong Loo Lin School of Medicine"
  title: "Professor of Psychological Medicine"
  bio: "<p>An active multidisciplinary scientist and educator for over two decades, Rodriguez embeds evidence-base into teaching at all university levels, supervising students to PhD completion, and mentoring post-docs. Spanning four countries, her research includes maternal and child health, mental health, neurodevelopment, and obesity. She is one of the leads for the Integrative Adolescence Research Programme (IARP) at A*STAR IHDP, which was developed to identify causal risk factors impacting adolescent mental health and to investigate the interplay between mental and physical health. The ultimate goal is to design and implement targeted prevention and intervention programmes.</p><p>Rodriguez earned her PhD from Uppsala University Sweden in psychology. She then trained extensively in public health and epidemiology at Imperial College London as a recipient of the prestigious fellowship from the Swedish Governmental Agency for Innovation Systems. Her unique background enables her to carry out international level research in pregnancy and life course development, disease risk from a socio-behavioural perspective, and contribute to the understanding of the crossover between mental and physical health.</p><p>Besides receiving the Knut & Alice Wallenberg Foundation for Promising Young Women in Research, Rodriguez is also a chartered member of the British Psychological Society, including the Division of Neuropsychology, Division of Academics, Researchers & Teachers in Psychology, Division of Clinical Psychology and the Faculty for Children, Young People and their Families; and currently serves on the Scientific and Medical Advisory Committee of Unlocking ADHD in Singapore.</p>"
  thumbnailUrl: AlinaRodriguez.jpg
  cardThumbnailUrl: AlinaRodriguez2.png
  rockstar: false
