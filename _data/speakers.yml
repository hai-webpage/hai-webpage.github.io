  surname: "Yan"
  company: "National University of Singapore"
  title: "Distinguished Professor (Practice) at the School of Computing"
  presentation: "Agent-nex: Inference Efficiency and Generative Memory"
  bio: "<p>Prof. Yan Shuicheng is currently a Distinguished Professor (Practice) at the School of Computing, National University of Singapore. He previously served as the Group Chief Scientist at Sea Group and has held several other notable industry positions. Prof. Yan is a Fellow of the Singapore Academy of Engineering, AAAI, ACM, IEEE, and IAPR. His research focuses on computer vision, machine learning, and multimedia analysis. He has also been recognised as one of the World's Highly Cited Researchers for ten years. Under Prof. Yan's leadership, his team has secured ten first-place or honorable-mention accolades in two flagship competitions: Pascal VOC and ImageNet (ILSVRC). Additionally, his team has earned more than ten best paper and best student paper awards, including a remarkable grand slam at ACM Multimedia, a premier conference in multimedia research, with three Best Paper Awards, two Best Student Paper Awards, and one Best Demo Award.</p"
