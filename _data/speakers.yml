  id: 15
  name: "Wai Hoe"
  surname: "Ng"
  company: "SingHealth"
  title: "Group Chief Executive Officer"
  bio: "<p>Professor Ng Wai Hoe is the Group Chief Executive Officer of SingHealth and Professor at Duke-NUS Medical School. He was previously Deputy Group Chief Executive Officer (Strategy & Planning) of SingHealth, Chief Executive Officer of Changi General Hospital (CGH), Medical Director/Chief Executive Officer of the National Neuroscience Institute (NNI), Academic Chair of the SingHealth Duke-NUS Neuroscience Academic Clinical Programme and Deputy Chair of the SingHealth Medical Board.</p><p>He has present and past administrative responsibilities as Member of the Duke-NUS Governing Board, Executive Committee Member of the National Medical Research Council (NMRC), Member of the Human Health Potential (HHP) Executive Committee of the National Research Foundation (NRF), Member of the Medical Device Advisory Committee (MDAC) with the Health Sciences Authority (HSA) Singapore, Member of the Medical Technology Advisory Council (MTAC) of the Ministry of Health (MOH), Co-Chairperson of the Workgroup to Review the Taking of Informed Consent and Singapore Medical Council Disciplinary Process with the MOH and Panel of Chairmen of Disciplinary Tribunal with the Singapore Medical Council (SMC).</p><p>His clinical practice focuses on neurosurgical oncology, epilepsy surgery and stereotactic and functional neurosurgery. He was past Chairman of the Neurosurgery Residency Advisory Committee (RAC) and past Chairman of the Chapter of Neurosurgeons (Singapore).</p>"
  thumbnailUrl: NgWaiHoe.png
  cardThumbnailUrl: NgWaiHoe2.png
  rockstar: true
